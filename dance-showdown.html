  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e */\n@font-face {\n  font-family: 'Lobster';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5fdedd60-3d0b-4577-b5b3-e2f0edefc4e6\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lobster';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"950982fd-b901-445f-8e04-2db389af1e52\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lobster';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"072271cf-77be-4e96-9758-50e9c8a17046\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Permanent Marker';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f4110e65-54e1-4959-ae91-e8ada63af8f1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n@font-face{\n  font-family:'Barabara';\n  src:url(\"43075c0f-6874-401f-aa6d-08ac84ba86a6\") format(\"woff2\"),\n      url(\"694b2e86-8bc7-4952-91e4-41cac19d7886\") format(\"woff\");\n  font-weight:400;font-display:swap;\n}\n\n/* ============================================================\n   Musika SamaSama — Color tokens\n   Logo palette refreshed for a HIP MUSIC + DANCE festival:\n   the original coral / blue / cyan / gold / olive get pushed\n   to electric saturation and joined by hot magenta + ultraviolet\n   for nightlife/stage energy, anchored on a warm near-black ink.\n   ============================================================ */\n:root {\n  /* ---- Brand core (electric) ---- */\n  --coral:        #FF5A4D;  /* hero red-orange, from MUSIKA banner */\n  --coral-deep:   #E8392B;\n  --tangerine:    #FF8A2B;  /* sunset orange (save-the-date field) */\n  --sunshine:     #FFC222;  /* gold banner */\n  --electric:     #1B66E0;  /* the script blue */\n  --aqua:         #2FD4E8;  /* cyan shadow / highlight */\n  --magenta:      #FF2E88;  /* NEW — hot pink, dance-floor energy */\n  --ultraviolet:  #7A2FE0;  /* NEW — stage-light purple */\n  --lime:         #BCDB3C;  /* refreshed olive tagline banner */\n\n  /* ---- Ink + neutrals (warm) ---- */\n  --ink:          #18122B;  /* near-black, violet-warm */\n  --ink-2:        #271C42;  /* raised dark surface */\n  --ink-3:        #3A2C5C;  /* dark border / hover */\n  --paper:        #FFF8EC;  /* warm festival paper */\n  --paper-2:      #FBEFDC;  /* sand */\n  --cloud:        #F2ECE0;\n  --line:         #E7DDCB;  /* hairline on paper */\n  --slate:        #6B6175;  /* muted text on paper */\n  --white:        #FFFFFF;\n\n  /* ---- Tints (soft fills) ---- */\n  --coral-tint:   #FFE5E1;\n  --electric-tint:#DCE9FD;\n  --aqua-tint:    #D6F6FB;\n  --magenta-tint: #FFE0EE;\n  --sunshine-tint:#FFF1CC;\n  --lime-tint:    #F1F7D2;\n  --uv-tint:      #ECE0FB;\n\n  /* ---- Semantic aliases ---- */\n  --bg-page:        var(--paper);\n  --bg-stage:       var(--ink);        /* dark \"stage\" sections */\n  --surface-card:   var(--white);\n  --surface-raised: var(--ink-2);\n  --text-strong:    var(--ink);\n  --text-body:      #2E2640;\n  --text-muted:     var(--slate);\n  --text-on-dark:   var(--paper);\n  --text-on-dark-muted: #B6A8D0;\n  --border-default: var(--line);\n  --border-strong:  var(--ink);\n\n  --accent-primary:   var(--coral);\n  --accent-secondary: var(--electric);\n  --accent-pop:       var(--magenta);\n\n  --focus-ring:     var(--electric);\n  --success:        #2BA45A;\n  --warning:        var(--sunshine);\n  --danger:         var(--coral-deep);\n\n  /* ---- Brand gradients (use sparingly, stage moments only) ---- */\n  --grad-sunset: linear-gradient(100deg, var(--magenta), var(--coral) 45%, var(--tangerine));\n  --grad-stage:  linear-gradient(135deg, var(--ultraviolet), var(--electric) 55%, var(--aqua));\n  --grad-spectrum: linear-gradient(90deg, var(--coral), var(--sunshine), var(--lime), var(--aqua), var(--electric), var(--magenta));\n}\n\n/* ============================================================\n   Musika SamaSama — Typography tokens\n   Barabara (display caps) · Lobster (script accent) · Archivo (UI/body)\n   ============================================================ */\n:root {\n  --font-display: 'Barabara', 'Anton', 'Arial Narrow', sans-serif;   /* poster headlines, ALL CAPS */\n  --font-script:  'Lobster', cursive;                   /* festival accent word */\n  --font-tag:     'Permanent Marker', 'Lobster', cursive; /* graffiti hand-tag accent */\n  --font-body:    'Archivo', system-ui, sans-serif;      /* everything else */\n\n  /* Type scale (1.250 major-third-ish, festival-loud) */\n  --fs-display-xl: clamp(3.5rem, 8vw, 6.5rem);  /* @kind font */\n  --fs-display:    clamp(2.75rem, 6vw, 4.5rem);  /* @kind font */\n  --fs-h1:         clamp(2.25rem, 4vw, 3.25rem);  /* @kind font */\n  --fs-h2:         clamp(1.75rem, 3vw, 2.5rem);  /* @kind font */\n  --fs-h3:         1.5rem;     /* @kind font */\n  --fs-h4:         1.25rem;    /* @kind font */\n  --fs-lg:         1.125rem;   /* @kind font */\n  --fs-body:       1rem;       /* @kind font */\n  --fs-sm:         0.875rem;   /* @kind font */\n  --fs-xs:         0.75rem;    /* @kind font */\n\n  /* Weights (Archivo) */\n  --fw-regular: 400;  /* @kind font */\n  --fw-medium:  500;  /* @kind font */\n  --fw-semibold:600;  /* @kind font */\n  --fw-bold:    700;  /* @kind font */\n  --fw-black:   800;  /* @kind font */\n\n  /* Line heights */\n  --lh-tight:   1.02;   /* @kind font */\n  --lh-snug:    1.18;   /* @kind font */\n  --lh-normal:  1.5;    /* @kind font */\n  --lh-relaxed: 1.65;   /* @kind font */\n\n  /* Tracking */\n  --ls-display: 0.01em;  /* @kind font */\n  --ls-caps:    0.14em;  /* @kind font */\n  --ls-normal:  0;       /* @kind font */\n}\n\n/* ============================================================\n   Musika SamaSama — Spacing, radius, layout tokens\n   8px base rhythm.\n   ============================================================ */\n:root {\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* Radii — friendly, rounded like the logo banners */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 16px;\n  --radius-lg: 24px;\n  --radius-xl: 32px;\n  --radius-pill: 999px;\n\n  /* Layout */\n  --container: 1200px;\n  --container-narrow: 760px;\n  --gutter: 24px;\n}\n\n/* ============================================================\n   Musika SamaSama — Effects: shadow, border, motion\n   Festival = playful & punchy. Signature look is the \"sticker\"\n   shadow: a hard offset drop in a brand color, no blur.\n   ============================================================ */\n:root {\n  /* Soft elevation (UI cards) */\n  --shadow-sm: 0 1px 2px rgba(24,18,43,.08), 0 2px 6px rgba(24,18,43,.06);\n  --shadow-md: 0 6px 18px rgba(24,18,43,.10), 0 2px 6px rgba(24,18,43,.06);\n  --shadow-lg: 0 18px 48px rgba(24,18,43,.16);\n\n  /* Signature HARD sticker shadows (no blur, brand-colored) */\n  --shadow-sticker:        4px 4px 0 var(--ink);\n  --shadow-sticker-coral:  4px 4px 0 var(--coral-deep);\n  --shadow-sticker-blue:   4px 4px 0 var(--electric);\n  --shadow-sticker-lg:     7px 7px 0 var(--ink);\n\n  /* Glow for dark \"stage\" surfaces */\n  --glow-magenta: 0 0 0 2px rgba(255,46,136,.4), 0 0 28px rgba(255,46,136,.45);\n  --glow-aqua:    0 0 0 2px rgba(47,212,232,.4), 0 0 28px rgba(47,212,232,.45);\n\n  /* Borders */\n  --border-width: 2px;       /* brand likes a confident 2px ink keyline */\n  --border-hair: 1px;\n\n  /* Motion */\n  --ease-out:   cubic-bezier(.22,.61,.36,1);   /* @kind other */\n  --ease-pop:   cubic-bezier(.34,1.56,.64,1);   /* @kind other */ /* overshoot bounce */\n  --dur-fast:   120ms;  /* @kind other */\n  --dur-base:   200ms;  /* @kind other */\n  --dur-slow:   360ms;  /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;min-height:100vh;background:var(--ink);font-family:var(--font-body);color:var(--paper);display:flex;flex-direction:column}\n  .bunting{display:flex;justify-content:center;overflow:hidden;line-height:0;flex-wrap:nowrap}\n  .bunting span{flex:none;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:26px solid var(--c)}\n  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 24px;text-align:center}\n  .inner{max-width:720px;margin:0 auto}\n  .wordmark{font-family:var(--font-display);text-transform:uppercase;font-size:20px;line-height:1;letter-spacing:.04em;color:var(--paper)}\n  .script{font-family:var(--font-script);color:var(--aqua);font-size:24px;margin-top:2px;margin-bottom:30px}\n  .coming{font-family:var(--font-display);text-transform:uppercase;font-size:clamp(3.75rem,13vw,8.5rem);line-height:.9;letter-spacing:.01em;margin:0;\n    background:var(--grad-spectrum);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .sub{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;font-size:clamp(1.25rem,3.5vw,2rem);color:var(--paper);margin:18px 0 0}\n  .msg{color:var(--text-on-dark-muted);font-size:clamp(1rem,2.2vw,1.2rem);line-height:1.6;margin:18px auto 0;max-width:560px;text-wrap:pretty}\n  .btn{display:inline-block;margin-top:36px;font-family:var(--font-body);font-weight:700;font-size:15px;text-decoration:none;color:var(--ink);\n    background:var(--sunshine);padding:13px 26px;border-radius:999px;border:2px solid var(--ink);transition:transform .12s ease}\n  .btn:hover{transform:translateY(-2px)}\n  .foot{padding:18px 24px;text-align:center;color:var(--text-on-dark-muted);font-size:13px;border-top:1px solid var(--ink-3)}\n<\u002Fstyle><\u002Fhead>\n<body>\n  \n  <div class=\"bunting\" id=\"bt\"><\u002Fdiv>\n  <main class=\"wrap\">\n    <div class=\"inner\">\n      <div class=\"wordmark\">Musika SamaSama<\u002Fdiv>\n      <div class=\"script\">Filipino Festival<\u002Fdiv>\n      <h1 class=\"coming\">Coming Soon<\u002Fh1>\n      <div class=\"sub\">Dance Showdown<\u002Fdiv>\n      <p class=\"msg\">Check back soon for the Dance Crew Contest details — we hope to see you at the Musika SamaSama Filipino Festival!<\u002Fp>\n      <a class=\"btn\" href=\"./\">← Back to the Festival<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <div class=\"bunting\" id=\"bb\"><\u002Fdiv>\n  <div class=\"foot\">© 2026 Musika SamaSama Filipino Festival · Night Out in the Parks<\u002Fdiv>\n  <script>\n    var cols=['var(--coral)','var(--tangerine)','var(--sunshine)','var(--lime)','var(--aqua)','var(--electric)','var(--magenta)','var(--ultraviolet)'];\n    function fill(el){var n=Math.ceil(window.innerWidth/32)+2;el.innerHTML='';for(var i=0;i<n;i++){var s=document.createElement('span');s.style.setProperty('--c',cols[i%cols.length]);el.appendChild(s);}}\n    function go(){fill(document.getElementById('bt'));fill(document.getElementById('bb'));}\n    go();window.addEventListener('resize',go);\n  <\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
